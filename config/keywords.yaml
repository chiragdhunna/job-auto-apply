# Job-search configuration (defaults). Runtime overrides for score_threshold,
# platform toggles, and run_interval_minutes are editable from the dashboard
# Settings page and persisted to the SQLite `settings` table.

target_roles:
  - "Python Backend Developer"
  - "GenAI Engineer"
  - "Flutter Developer"

locations:
  - "United Kingdom"
  - "Remote"
  - "India"

exclude_companies: []

# Minimum acceptable salary (in LPA — lakhs per annum). Used as a soft filter.
salary_floor_lpa: 10

# Jobs scoring at or above this threshold are auto-queued for application.
score_threshold: 70

# Which platforms are active. Toggle from the dashboard Settings page.
platforms:
  linkedin: true
  indeed: true
  greenhouse: true
  lever: true
  workday: true

# Independently-toggleable discovery sources (parallel to platforms above).
# Web-wide public APIs + extra company-ATS platforms added in Phase 2.
sources:
  remotive: true
  remoteok: true
  arbeitnow: true
  jobicy: true
  themuse: true
  adzuna: true            # needs ADZUNA_APP_ID / ADZUNA_APP_KEY in .env
  smartrecruiters: true
  recruitee: true

# How often the scheduler runs the full pipeline (minutes).
run_interval_minutes: 60

# Companies to pull open roles from via their public ATS APIs.
# These are EXAMPLES — replace with the companies you actually want to target.
#   greenhouse/lever/ashby: the company's board slug (the {company} in the API URL)
#   workday: objects with a tenant-specific CxS endpoint (see README / WorkdayScraper)
ats_companies:
  greenhouse:
    - "stripe"
    - "gitlab"
    - "databricks"
  lever:
    # NOTE: "leverdemo" is Lever's DEMO board — don't add it back; applications
    # there go nowhere. Add real Lever-hosted companies you want to target.
    - "plaid"
  ashby:
    - "ramp"
    - "notion"
    - "openai"
  # SmartRecruiters company IDs (the {company} in api.smartrecruiters.com/.../{company}/postings)
  smartrecruiters:
    - "Devoteam"
    - "ServiceNow"
    - "Visa"
  # Recruitee subdomains ({company} in {company}.recruitee.com). Most boards are
  # private; replace with your real targets. "sendcloud" is a public example.
  recruitee:
    - "sendcloud"
  # Workday is tenant-specific — no generic slug works. To scrape one, supply its
  # CxS endpoint (open the company's Workday careers site, watch the network tab
  # for a POST to /wday/cxs/.../jobs) as objects, e.g.:
  #   - name: "Company"
  #     cxs_url: "https://company.wdN.myworkdayjobs.com/wday/cxs/company/SITE/jobs"
  #     site_url: "https://company.wdN.myworkdayjobs.com/en-US/SITE"
  workday: []

