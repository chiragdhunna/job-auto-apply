# Base theme matched to dashboard/theme.py (terminal/amber) so Streamlit's own
# chrome doesn't flash a mismatched palette before the custom CSS applies.
[theme]
base = "dark"
primaryColor = "#e0a940"
backgroundColor = "#0a0d0a"
secondaryBackgroundColor = "#12160f"
textColor = "#d8dcd1"
font = "monospace"

[server]
headless = true
