# Base theme — the CSS in dashboard/theme.py layers the full design on top,
# but setting these makes Streamlit's own chrome (menus, widgets) match so there
# is no flash of default styling before the custom CSS applies.
[theme]
base = "dark"
primaryColor = "#4C9DF7"
backgroundColor = "#0E1621"
secondaryBackgroundColor = "#18222E"
textColor = "#E7EDF3"
font = "sans serif"

[server]
headless = true
